spring:
  application:
    name: ai-chat-disposition-engine

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/converse_disposition?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jooq:
    sql-dialect: MYSQL

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    elasticsearch:
      repositories:
        enabled: false

  elasticsearch:
    uris: ${ES_URI:http://localhost:9200}

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

aws:
  region: ${AWS_REGION:ap-south-1}
  bedrock:
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20241022-v2:0}

disposition:
  transcript:
    max-messages: 150
    head-keep: 10
    tail-keep: 50
    max-input-chars: 48000
  redis:
    cache-ttl-hours: 24
    key-prefix: disposition
  crm:
    base-url: ${CRM_BASE_URL:http://localhost:9090}
    activity-type: CHAT_DISPOSITION
    timeout-ms: 5000

resilience4j:
  retry:
    instances:
      bedrock:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.services.bedrockruntime.model.ThrottlingException
          - java.io.IOException
      crmApi:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      bedrock:
        failure-rate-threshold: 50
        minimum-number-of-calls: 20
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5

logging:
  level:
    com.converse.disposition: INFO
    org.jooq: WARN
